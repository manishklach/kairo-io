name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  bench-and-scripts:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Build benchmark harness
        run: gcc -O2 -Wall -pthread -Iinclude -o kairo_bench bench/kairo_bench.c

      - name: Run shellcheck on scripts
        run: find scripts -maxdepth 1 -type f -name '*.sh' -print0 | xargs -0 shellcheck

  patch-apply:
    runs-on: ubuntu-24.04
    env:
      LINUX_REF: v6.8.12
      LINUX_CACHE_DIR: ${{ github.workspace }}/.cache/linux-6.8.12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore cached Linux source
        uses: actions/cache@v4
        with:
          path: ${{ env.LINUX_CACHE_DIR }}
          key: linux-src-${{ env.LINUX_REF }}-sparse-v1

      - name: Fetch pinned Linux 6.8.12 source tree
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d "$LINUX_CACHE_DIR/.git" ]]; then
            mkdir -p "$LINUX_CACHE_DIR"
            git init "$LINUX_CACHE_DIR"
            git -C "$LINUX_CACHE_DIR" remote add origin https://github.com/torvalds/linux.git
            git -C "$LINUX_CACHE_DIR" config core.sparseCheckout true
            cat > "$LINUX_CACHE_DIR/.git/info/sparse-checkout" <<'EOF'
block/
drivers/nvme/host/
fs/
include/
io_uring/
mm/
EOF
          fi
          git -C "$LINUX_CACHE_DIR" fetch --depth 1 origin "$LINUX_REF"
          git -C "$LINUX_CACHE_DIR" checkout --force FETCH_HEAD

      - name: Check patch stack applies on Linux 6.8.12
        shell: bash
        run: |
          set -euo pipefail
          linux_tree="$RUNNER_TEMP/linux-6.8.12-check"
          rm -rf "$linux_tree"
          cp -R "$LINUX_CACHE_DIR" "$linux_tree"
          find kernel/patches -maxdepth 1 -type f -name '*.patch' | sort | while read -r patch; do
            echo "[ci] checking $(basename "$patch")"
            git -C "$linux_tree" apply --check "$GITHUB_WORKSPACE/$patch"
            git -C "$linux_tree" apply "$GITHUB_WORKSPACE/$patch"
          done
